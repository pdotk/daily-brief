name: Daily Brief

on:
  # Runs every weekday at 2:00 PM UTC (9:00 AM ET / 6:00 AM PT)
  # Adjust the cron time to match YOUR morning!
  schedule:
    - cron: '0 13 * * 1-5'

  # Allows you to manually trigger it anytime for testing
  workflow_dispatch:

jobs:
  send-daily-brief:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run daily brief
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_USER_ID: ${{ secrets.SLACK_USER_ID }}
          GOOGLE_CALENDAR_API_KEY: ${{ secrets.GOOGLE_CALENDAR_API_KEY }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
        run: python daily_brief.py
